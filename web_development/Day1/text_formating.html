<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text formating tag</title>
  </head>
  <body>
    <p><b>Bold text</b></p>
    <p><i>italic text</i></p>
    <p><u>under line text</u></p>
    <p><ins>inserted text</ins></p>
    <p><del> deleted text</del></p>
    <p><strike>Strikethrough text</strike></p>
    <p>X <sub>2</sub>Y</p>
    // subscript
    <p>H <sup>2</sup>0</p>
    // superscript
    <p><big>Bigger</big></p>
    <p><small>Smaller</small></p>
    <img
      src="https://static.vecteezy.com/system/resources/thumbnails/052/248/075/small/peacock-feather-wallpaper-hd-wallpaper-photo.jpeg"
      alt="this is image"
      height="200 "
      width="500"
    />
  </body>
</html>
