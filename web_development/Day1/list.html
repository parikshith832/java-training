<html lang="en">
  <head>

    <title>Document</title>

  <body>
    <h2>Unordered list</h2>
    <!--bulletin pointers-->
    <ul>
      <li>item 1</li>
      <li>item 2</li>
      <li>item 3</li>

    <h2>Ordered list</h2>
    <!--number series-->

      <li>item 1</li>
      <li>item 2</li>

    </ol>

      <dt>HTML</dt>
      <dd>HyperText Markup Language</dd>
      <dt>CSS</dt>
      <dd>Cascading Style Sheet</dd>
      <dt>JavaScript</dt>
      <dd>Programing language</dd>
    </dl>
