<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Student</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="form-box">

    <h2>Add New Student</h2>

    <form th:action="@{/save}" th:object="${student}" method="post">

        <label>Name</label>

        <input type="text" th:field="*{name}" required>

        <label>USN</label>

        <input type="text" th:field="*{usn}" required>

        <label>Branch</label>

        <input type="text" th:field="*{branch}" required>

        <label>Email</label>

        <input type="email" th:field="*{email}" required>

        <label>Mobile</label>

        <input type="text" th:field="*{mobile}" required>

        <button type="submit">

            Save Student

        </button>

    </form>

    <br>

    <a href="/" class="back">

        ← Back

    </a>

</div>

</body>

</html>
