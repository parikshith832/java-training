<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sapthagiri College Student Management</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h1>Sapthagiri College Student Management System</h1>

    <a href="/add" class="btn-add">
        + Add Student
    </a>

    <br><br>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>USN</th>

            <th>Branch</th>

            <th>Email</th>

            <th>Mobile</th>

            <th>Action</th>

        </tr>

        <tr th:each="student : ${students}">

            <td th:text="${student.id}"></td>

            <td th:text="${student.name}"></td>

            <td th:text="${student.usn}"></td>

            <td th:text="${student.branch}"></td>

            <td th:text="${student.email}"></td>

            <td th:text="${student.mobile}"></td>

            <td>

                <a class="btn-edit"
                   th:href="@{/edit/{id}(id=${student.id})}">
                    Edit
                </a>

                <a class="btn-delete"
                   th:href="@{/delete/{id}(id=${student.id})}">
                    Delete
                </a>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
